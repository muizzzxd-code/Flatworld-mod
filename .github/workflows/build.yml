name: Build Flat World Mod
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Gradle 8.11
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.11-bin.zip
          unzip -q gradle-8.11-bin.zip -d $HOME/gradle
          echo "$HOME/gradle/gradle-8.11/bin" >> $GITHUB_PATH

      - name: Build Mod
        run: gradle build --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: flatworld-mod-jar
          path: build/libs/flatworld-*.jar
